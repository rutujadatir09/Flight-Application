spring.application.name=flight-service
server.port=8080
app.cors.allowed-origins=http://localhost:5173

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/flightdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:flightuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:NewPassword123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
